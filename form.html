<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Pertanyaan IPI Bangkalan</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
    min-height:100vh;
    background: linear-gradient(135deg,#e0f2fe,#f0fdfa,#f8fafc);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
    font-family:'Segoe UI',sans-serif;
}

.form-card{
    max-width:700px;
    width:100%;
    background:#fff;
    border-radius:30px;
    overflow:hidden;
    box-shadow:0 20px 50px rgba(15,23,42,.12);
    padding:0;
    border:1px solid #e2e8f0;
}

/* Header */
.form-header{
    background:linear-gradient(135deg,#10a839,#198034);
    color:white;
    text-align:center;
    padding:35px 25px;
}

.form-header .logo-icon{
    width:75px;
    height:75px;
    background:rgba(255,255,255,.2);
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:auto;
    margin-bottom:15px;
    font-size:2rem;
}

.form-header h2{
    font-weight:800;
    margin-bottom:8px;
}

.form-header p{
    margin:0;
    opacity:.9;
}

/* Form Body */
.form-body{
    padding:35px;
}

.form-label{
    font-weight:700;
    color:#334155;
    margin-bottom:8px;
}

.form-control{
    border-radius:15px;
    border:2px solid #e2e8f0;
    padding:14px 16px;
    transition:.3s;
}

.form-control:focus{
    border-color:#14d406;
    box-shadow:0 0 0 .2rem rgba(6,182,212,.15);
}

textarea.form-control{
    resize:none;
}

/* Buttons */
.btn-wa{
    background:linear-gradient(135deg,#22c55e,#16a34a);
    border:none;
    color:white;
    font-weight:700;
    padding:14px;
    border-radius:15px;
    transition:.3s;
}

.btn-wa:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 20px rgba(34,197,94,.25);
    color:white;
}

.btn-back{
    border-radius:15px;
    padding:14px;
    font-weight:600;
}

.info-box{
    background:#f8fafc;
    border-left:4px solid #06b6d4;
    padding:15px;
    border-radius:12px;
    margin-bottom:25px;
    color:#475569;
    font-size:.95rem;
}
    </style>
</head>
<body>

<div class="container">

    <div class="form-card">

        <div class="form-header">
            <div class="logo-icon">
                <link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
                <i class="bi bi-whatsapp"></i>
            </div>

            <h2>Form Pertanyaan & Saran</h2>

            <p>
                Ikatan Penilik Indonesia Kabupaten Bangkalan
            </p>
        </div>

        <div class="form-body">

            <div class="info-box">
                Silakan tuliskan pertanyaan, saran, atau masukan Anda.
                Pesan akan langsung dikirim ke WhatsApp admin IPI Bangkalan.
            </div>

            <form id="waForm">

                <div class="mb-3">
                    <label class="form-label">
                        Nama Lengkap
                    </label>

                    <input type="text"
                           id="nama"
                           class="form-control"
                           placeholder="Masukkan nama lengkap"
                           required>
                </div>

                <div class="mb-4">
                    <label class="form-label">
                        Pesan / Pertanyaan / Saran
                    </label>

                    <textarea id="pesan"
                              rows="5"
                              class="form-control"
                              placeholder="Tuliskan pesan Anda..."
                              required></textarea>
                </div>

                <div class="d-grid gap-2">

                    <button type="submit" class="btn btn-wa">
                        Kirim ke WhatsApp
                    </button>

                    <a href="index.html"
                       class="btn btn-outline-secondary btn-back">
                        ← Kembali ke Beranda
                    </a>

                </div>

            </form>

        </div>

    </div>

</div>

</form>

    </div>
</div>

<script>
document.getElementById('waForm').addEventListener('submit', function(e){

    e.preventDefault();

    let nama = document.getElementById('nama').value;
    let pesan = document.getElementById('pesan').value;

    let nomorWA = '6281330458708'; // ganti nomor admin

    let text =
`*PERTANYAAN WEBSITE IPI BANGKALAN*

Nama : ${nama}

Pesan :
${pesan}`;

    let url =
`https://wa.me/${nomorWA}?text=${encodeURIComponent(text)}`;

    window.open(url, '_blank');

});
</script>

</body>
</html>
