<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f5f7fa;
}

.login-box{
    max-width:450px;
    margin:80px auto;
}
</style>

</head>
<body>

<div class="container">

    <div class="login-box">

        <div class="card p-4 shadow">

            <h3 class="text-center mb-4">
                Login
            </h3>

            <input
                type="text"
                id="username"
                class="form-control mb-3"
                placeholder="Username">

            <input
                type="password"
                id="password"
                class="form-control mb-3"
                placeholder="Password">

            <button
                onclick="login()"
                class="btn btn-primary">

                Login

            </button>

            <hr>

            <a href="register.html"
               class="btn btn-success">

               Belum punya akun?
               Register

            </a>

        </div>

    </div>

</div>

<script>
async function login(){
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    if (!username || !password) {
        alert("Username dan password tidak boleh kosong");
        return;
    }

    try {
        const response = await fetch("/api/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ username, password })
        });

        // Cek jika server mengirimkan error (status 500 atau 404) bukan JSON
        if (!response.ok && response.status === 500) {
            alert("Terjadi kesalahan pada server (500). Pastikan Environment Variables sudah diisi di Vercel.");
            return;
        }

        const result = await response.json();

        if (result.success) {
            localStorage.setItem("user", JSON.stringify(result.user));
            window.location.href = "index.html";
        } else {
            alert(result.message || "Username atau Password salah");
        }
    } catch (error) {
        console.error(error);
        alert("Gagal terhubung ke server atau terjadi kesalahan sistem.");
    }
}
</script>

</body>
</html>
