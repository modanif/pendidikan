<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Twibbon MPLS 2026</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<style>
body{
    background:#f4f8ff;
}

.twibbon-box{
    max-width:800px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.1);
}

.preview{
    text-align:center;
}

canvas{
    width:100%;
    max-width:500px;
    border-radius:15px;
}

.title{
    background:linear-gradient(135deg,#4f46e5,#9333ea);
    color:white;
    padding:15px;
    border-radius:15px;
    text-align:center;
    margin-bottom:20px;
    font-weight:bold;
    font-size:24px;
}

</style>
</head>
<body>

<div class="container py-4">

<div class="twibbon-box">

    <div class="d-flex justify-content-between align-items-center mb-3">

     <div class="d-flex gap-2 align-items-center">
            <a href="index.html" class="btn btn-light btn-sm px-3 rounded-pill text-primary fw-semibold text-decoration-none">
                <i class="fa-solid fa-house"></i> Beranda
            </a>
            <div id="authButton"></div>
        </div>

    <span class="text-muted">
        ©️ Rhaka Vision 
    </span>

</div>

<div class="title">
    🎓 Twibbon MPLS 2026
</div>

<div class="mb-3">
    <label class="form-label fw-semibold">
        Nama Lengkap
    </label>

    <input type="text"
           id="nama"
           class="form-control"
           placeholder="Masukkan nama lengkap">
</div>

<div class="mb-3">
    <label class="form-label fw-semibold">
        Nama Satuan Pendidikan
    </label>

    <input type="text"
           id="sekolah"
           class="form-control"
           placeholder="Masukkan Nama Satuan Pendidikan">
</div>

<div class="mb-3">
<label>Upload Foto</label>
<input type="file"
       id="foto"
       accept="image/*"
       class="form-control">
</div>

<div class="preview">

<canvas id="canvas"
        width="1080"
        height="1080">
</canvas>

</div>

<hr>

<h5>Geser Kanan - Kiri</h5>
<input type="range"
       id="moveX"
       min="-400"
       max="400"
       value="0"
       class="form-range">

<h5>Geser Atas - Bawah</h5>
<input type="range"
       id="moveY"
       min="-500"
       max="500"
       value="0"
       class="form-range">

<h5>Zoom Foto</h5>
<input type="range"
       id="zoom"
       min="100"
       max="500"
       value="100"
       class="form-range">     

<div class="text-center mt-4">

<button onclick="downloadTwibbon()"
        class="btn btn-success">
Download Twibbon
</button>

</div>

</div>

</div>

<script src="twibbon.js"></script>

</body>
</html>
