<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forum Diskusi - Penilik</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .forum-container {
            max-width: 800px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            padding: 30px;
        }
    </style>
</head>
<body>

<div class="container my-5 forum-container">
    <div class="d-flex justify-content-between align-items-center pb-3 border-bottom mb-4">
        <h4 id="welcome" class="fw-bold text-primary mb-0"></h4>
        <button onclick="logout()" class="btn btn-outline-danger btn-sm px-3 rounded-pill">
            Logout
        </button>
    </div>

    <div class="mb-4">
        <h5 class="fw-semibold text-secondary mb-3">Daftar Komentar</h5>
        <div id="listKomentar">
            <div class="text-center py-4 text-muted">Membuka komentar...</div>
        </div>
    </div>

    <div id="formKomentar" class="pt-3"></div>
</div>

<script src="js/forum.js"></script>

</body>
</html>
