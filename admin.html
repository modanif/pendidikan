<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - Penilik</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #eef2f7; font-family: 'Segoe UI', Tahoma, sans-serif; }
        .admin-wrapper { max-width: 900px; margin: 40px auto; }
        .header-card { background: linear-gradient(135deg, #1e3c72, #2a5298); color: white; border-radius: 15px; padding: 25px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="container admin-wrapper">
    <div class="header-card mb-4 d-flex justify-content-between align-items-center">
        <div>
            <h3 class="mb-1"><i class="fa-solid fa-user-shield"></i> Panel Manajemen Admin</h3>
            <p id="adminWelcome" class="mb-0 opacity-75">Memuat data sesi...</p>
        </div>
        <a href="index.html" class="btn btn-light btn-sm px-3 rounded-pill text-primary fw-semibold text-decoration-none">
            <i class="fa-solid fa-house"></i> Beranda
        </a>
    </div>

    <div id="daftarUserAdmin">
        <div class="text-center py-5 bg-white rounded shadow-sm">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-2 text-muted mb-0">Memuat daftar pengguna...</p>
        </div>
    </div>
</div>

<script src="js/admin.js"></script>
</body>
</html>
